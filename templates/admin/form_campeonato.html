{% extends "base.html" %}
{% block title %}Novo Campeonato - Admin{% endblock %}

{% block content %}
<div class="auth-container" style="margin-top: 150px; max-width: 700px;" data-aos="zoom-in">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🏆</div>
        <h1>Novo <span>Campeonato</span></h1>
        <p style="color: var(--text-muted);">Preencha os dados para abrir as inscrições.</p>
    </div>

    <form method="POST" class="glass-card">
        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group" style="grid-column: 1 / -1;">
                <label class="form-label">Nome do Campeonato</label>
                <input type="text" name="nome" class="form-input" placeholder="Ex: Torneio de Verão" required>
            </div>
            <div class="form-group">
                <label class="form-label">Data</label>
                <input type="date" name="data" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Horário</label>
                <input type="time" name="hora" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Local</label>
                <input type="text" name="local" class="form-input" placeholder="Ex: Ginásio Municipal" required>
            </div>
            <div class="form-group">
                <label class="form-label">Categoria</label>
                <select name="categoria" class="form-input">
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Misto">Misto</option>
                    <option value="Geral">Geral</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Máximo de Participantes</label>
                <input type="number" name="max_participantes" class="form-input" value="12" min="1" required>
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label class="form-label">Regras e Descrição</label>
                <textarea name="regras" class="form-input" rows="5" placeholder="Escreva as regras do campeonato aqui..."></textarea>
            </div>
        </div>
        
        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline" style="flex: 1;">Cancelar</a>
            <button type="submit" class="btn btn-primary" style="flex: 2;">Criar Campeonato</button>
        </div>
    </form>
</div>
{% endblock %}
