{% extends "base.html" %}
{% block title %}Criar Conta – VôleiPro{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="glass-card" style="text-align: center; max-width: 500px; width: 100%;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🏐</div>
    <h2 style="margin-bottom: 0.5rem; font-size: 1.8rem; font-weight: 800;">Criar Conta</h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1rem;">Cadastre-se para participar dos campeonatos</p>

    <form method="POST">
      <div class="form-group" style="text-align: left;">
        <label class="form-label">Nome completo *</label>
        <input type="text" name="nome" class="form-input" placeholder="Seu nome" required>
      </div>

      <div class="form-group" style="text-align: left;">
        <label class="form-label">E-mail *</label>
        <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
      </div>

      <div class="form-group" style="text-align: left;">
        <label class="form-label">Telefone / WhatsApp *</label>
        <input type="text" name="telefone" class="form-input" placeholder="(17) 99999-9999" required>
      </div>

      <div class="form-group" style="text-align: left;">
        <label class="form-label">Senha *</label>
        <input type="password" name="senha" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>

      <div class="form-group" style="text-align: left;">
        <label class="form-label">Confirmar senha *</label>
        <input type="password" name="confirma_senha" class="form-input" placeholder="Repita a senha" required onchange="if(this.value !== document.querySelector('input[name=senha]').value) alert('As senhas n\u00e3o conferem!');">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.95rem 2rem;">Criar Conta</button>
    </form>

    <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
      Já tem conta? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}
