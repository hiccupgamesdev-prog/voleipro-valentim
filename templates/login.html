{% extends "base.html" %}
{% block title %}Entrar – VôleiPro{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="glass-card" style="text-align: center; max-width: 500px; width: 100%;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🏐</div>
    <h2 style="margin-bottom: 0.5rem; font-size: 1.8rem; font-weight: 800;">Bem-vindo de volta</h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1rem;">Acesse sua conta para ver os campeonatos</p>

    <form method="POST">
      <div class="form-group" style="text-align: left;">
        <label class="form-label">E-mail</label>
        <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
      </div>

      <div class="form-group" style="text-align: left;">
        <label class="form-label">Senha</label>
        <input type="password" name="senha" class="form-input" placeholder="Sua senha" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.95rem 2rem;">Entrar no Sistema</button>
    </form>

    <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
      Ainda não tem conta? <a href="{{ url_for('cadastro') }}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Cadastrar</a>
    </p>
    

  </div>
</div>
{% endblock %}
