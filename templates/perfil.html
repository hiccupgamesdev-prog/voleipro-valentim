{% extends "base.html" %}
{% block title %}Meu Perfil - VôleiPro{% endblock %}

{% block content %}
<div class="auth-container" style="margin-top: 150px;" data-aos="zoom-in">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">👤</div>
        <h1>Meu <span>Perfil</span></h1>
        <p style="color: var(--text-muted);">Mantenha seus dados de atleta atualizados.</p>
    </div>

    <form method="POST" class="glass-card">
        <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" name="nome" class="form-input" value="{{ user.nome }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">E-mail (Não pode ser alterado)</label>
            <input type="email" class="form-input" value="{{ user.email }}" disabled style="opacity: 0.5; cursor: not-allowed;">
        </div>
        <div class="form-group">
            <label class="form-label">Telefone / WhatsApp</label>
            <input type="text" name="telefone" class="form-input" value="{{ user.telefone }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">Nova Senha (Deixe em branco para não alterar)</label>
            <input type="password" name="nova_senha" class="form-input" placeholder="Mínimo 6 caracteres">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Salvar Alterações</button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem;">
        <a href="{{ url_for('logout') }}" style="color: #ff4b4b; font-weight: 600; text-decoration: none;">Sair da Conta</a>
    </div>
</div>
{% endblock %}
